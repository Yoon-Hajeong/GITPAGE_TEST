name: Deploy two-site Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm (for Fuwari)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Sync WIKI -> sites
        run: node scripts/sync-wiki.mjs

      - name: Install Fuwari deps
        working-directory: sites/public
        run: pnpm install --frozen-lockfile

      - name: Build Fuwari
        working-directory: sites/public
        run: pnpm build

      - name: Install Quartz deps
        working-directory: sites/personal
        run: npm ci

      - name: Build Quartz
        working-directory: sites/personal
        run: npx quartz build

      - name: Combine sites
        run: |
          mkdir -p _site
          cp -r sites/public/dist/* _site/
          mkdir -p _site/notes
          cp -r sites/personal/public/* _site/notes/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=wikitest --commit-dirty=true
