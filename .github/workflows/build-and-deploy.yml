name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Sync and Build
        run: |
          node scripts/sync-wiki.mjs
          cd sites/public && pnpm install && pnpm build
          cd ../personal && npm ci && npx quartz build
          cd ../..
          mkdir -p _site
          cp -r sites/public/dist/* _site/
          mkdir -p _site/notes
          cp -r sites/personal/public/* _site/notes/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        env:
          WRANGLER_PROJECT_NAME: gitpage-test
        run: |
          # Deploy to Cloudflare Pages
          npx wrangler pages deploy _site --project-name=gitpage-test --branch=main
